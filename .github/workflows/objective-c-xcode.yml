name: Build Custom Frida Gadget

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Frida Repository
        uses: actions/checkout@v4
        with:
          # CRITICAL: This pulls in frida-core, frida-gum, and the toolchains
          submodules: recursive 

      - name: Install Build Dependencies
        run: |
          brew update
          brew install node npm ninja meson pkg-config vala
          npm install -g frida-compile

      - name: Inject Custom Anti-Cheat Kills
        run: |
          echo "Performing surgery on frida-core..."
          # This overwrites the default gadget loader with your native AC killer
          cp bs-custom-files/gadget-darwin.m subprojects/frida-core/lib/gadget/gadget-darwin.m

      - name: Build iOS Gadget
        run: |
          # Frida's makefile automatically handles downloading the iOS toolchains 
          # and running Meson to cross-compile specifically for iOS ARM64.
          make core-ios

      - name: Package gadget.framework
        run: |
          echo "Packaging the framework..."
          mkdir -p gadget.framework/ss
          
          # Frida outputs the compiled iOS dylib deep in the build folder. 
          # We copy and rename it to 'gadget' so the game loads it correctly.
          cp build/frida-ios-arm64/lib/frida/64/frida-gadget.dylib gadget.framework/gadget
          

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadget-framework
          path: gadget.framework
