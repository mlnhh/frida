name: Build Custom Frida Gadget

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Frida Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install Build Dependencies
        run: |
          brew update
          brew install node npm ninja meson pkg-config vala
          npm install -g frida-compile
          python3 -m pip install setuptools --break-system-packages

      - name: Inject Native Byte Bank & Stalker
        run: |
          python3 -c '
          with open("subprojects/frida-core/lib/gadget/gadget-glue.c", "r") as f:
              code = f.read()
          
          injection = """
          #include <gum/gum.h>
          #include <mach-o/dyld.h>
          #include <mach-o/getsect.h>
          #include <syslog.h>
          #include <string.h>
          
          // Global Pointers for the Memory Shadow
          static gpointer clean_byte_bank = NULL;
          static gsize text_segment_size = 0;
          static gpointer real_text_base = NULL;
          
          __attribute__((constructor))
          static void establish_byte_bank(void) {
              syslog(LOG_ERR, "[WIRETAP] NATIVE GADGET AWAKE. Establishing Byte Bank...");
              
              // 1. Find the laser binary in RAM instantly
              const struct mach_header_64 *header = (const struct mach_header_64 *)_dyld_get_image_header(0);
              if (!header) {
                  syslog(LOG_ERR, "[WIRETAP] FATAL: Could not find main executable header.");
                  return;
              }
              
              // 2. Parse the Mach-O to find the exact __TEXT segment (the executable code Promon hashes)
              unsigned long text_size;
              uint8_t *text_data = getsectiondata(header, "__TEXT", "__text", &text_size);
              
              if (text_data && text_size > 0) {
                  real_text_base = (gpointer)text_data;
                  text_segment_size = (gsize)text_size;
                  
                  // 3. Allocate the hidden vault and take the clean snapshot BEFORE mods apply
                  clean_byte_bank = g_malloc(text_segment_size);
                  memcpy(clean_byte_bank, real_text_base, text_segment_size);
                  
                  syslog(LOG_ERR, "[WIRETAP] BYTE BANK SECURED! Copied %lu bytes to hidden vault at %p", text_size, clean_byte_bank);
              }
              
              // 4. Initialize Frida Gum natively
              gum_init_embedded();
              syslog(LOG_ERR, "[WIRETAP] Native Gum initialized.");
          }
          """
          
          code = injection + "\n" + code
          code = code.replace("gum_init_embedded ();", "// gum_init_embedded handled by wiretap")
          
          with open("subprojects/frida-core/lib/gadget/gadget-glue.c", "w") as f:
              f.write(code)
          '

      - name: Build iOS Gadget
        run: |
          export FRIDA_PYTHON=disabled
          export FRIDA_SWIFT=disabled
          export FRIDA_TOOLS=disabled
          export FRIDA_NODE=disabled
          export CFLAGS="-DFRIDA_LIBDIR_NAME=\\\"lib\\\""
          export OBJCFLAGS="-DFRIDA_LIBDIR_NAME=\\\"lib\\\""
          ./configure --host=ios-arm64
          make || true

      - name: Prepare Trojan Horse Dylib
        run: |
          mkdir payload
          find build -name "frida-gadget.dylib" -exec cp {} payload/libswiftCoreHaptics.dylib \;
          if [ ! -f payload/libswiftCoreHaptics.dylib ]; then
            find build -name "libfrida-gadget-raw.dylib" -exec cp {} payload/libswiftCoreHaptics.dylib \;
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: libswiftCoreHaptics
          path: payload/libswiftCoreHaptics.dylib
