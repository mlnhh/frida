name: Build Custom Frida Gadget

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Frida Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install Build Dependencies
        run: |
          brew update
          brew install node npm ninja meson pkg-config vala
          npm install -g frida-compile
          python3 -m pip install setuptools --break-system-packages

      - name: Inject Custom Anti-Cheat Kills
        run: |
          cat << 'EOF' >> subprojects/frida-core/lib/gadget/gadget-darwin.m
          
          #include <mach-o/dyld.h>
          #include <gum/gum.h>
          
          static void apply_ret_patch(gpointer mem, gpointer user_data) {
              guint32 *code = (guint32 *)mem;
              *code = 0xd65f03c0;
          }
          
          static void apply_mov1_ret_patch(gpointer mem, gpointer user_data) {
              guint32 *code = (guint32 *)mem;
              code[0] = 0x52800020;
              code[1] = 0xd65f03c0;
          }
          
          __attribute__((constructor(101)))
          static void execute_native_anticheat_kills(void) {
              gum_init_embedded();
              intptr_t slide = _dyld_get_image_vmaddr_slide(0);
              gum_memory_patch_code((gpointer)(slide + 0x101010da4), 4, apply_ret_patch, NULL);
              gum_memory_patch_code((gpointer)(slide + 0x1011e214c), 4, apply_ret_patch, NULL);
              gum_memory_patch_code((gpointer)(slide + 0x1011e1f54), 4, apply_ret_patch, NULL);
              gum_memory_patch_code((gpointer)(slide + 0x1011dfb24), 4, apply_ret_patch, NULL);
              gum_memory_patch_code((gpointer)(slide + 0x100004440), 4, apply_ret_patch, NULL);
              gum_memory_patch_code((gpointer)(slide + 0x1011e0170), 4, apply_ret_patch, NULL);
              gum_memory_patch_code((gpointer)(slide + 0x1010ad210), 8, apply_mov1_ret_patch, NULL);
          }
          EOF

      - name: Build iOS Gadget
        run: |
          export FRIDA_PYTHON=disabled
          export FRIDA_SWIFT=disabled
          export FRIDA_TOOLS=disabled
          export FRIDA_NODE=disabled
          export CFLAGS="-DFRIDA_LIBDIR_NAME=\\\"lib\\\""
          export OBJCFLAGS="-DFRIDA_LIBDIR_NAME=\\\"lib\\\""
          ./configure --host=ios-arm64
          make || true

      - name: Assemble gadget.framework
        run: |
          mkdir -p gadget.framework/ss
          
          find build -name "frida-gadget.dylib" -exec cp {} gadget.framework/gadget \;
          if [ ! -f gadget.framework/gadget ]; then
            find build -name "libfrida-gadget-raw.dylib" -exec cp {} gadget.framework/gadget \;
          fi
          
          cat << "EOF" > gadget.framework/gadget.config
          {
            "interaction": {
              "type": "script",
              "path": "ss/load.lebronjs",
              "on_change": "ignore"
            }
          }
          EOF
          
          cat << "EOF" > gadget.framework/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>CFBundleExecutable</key>
          <string>gadget</string>
          <key>CFBundleIdentifier</key>
          <string>re.frida.Gadget</string>
          <key>CFBundleName</key>
          <string>FridaGadget</string>
          <key>CFBundlePackageType</key>
          <string>FMWK</string>
          </dict>
          </plist>
          EOF
          
          cat << "EOF" > gadget.framework/ss/load.lebronjs
          var base = Module.getBaseAddress("laser");
          var Stage_instance = base.add(0x1012f4a80);
          var StringTable_getMovieClip = new NativeFunction(base.add(0x1005a0804), 'pointer', ['pointer', 'pointer']);
          var DisplayObject_setXY = new NativeFunction(base.add(0x1005a0f3c), 'void', ['pointer', 'float', 'float']);
          var DisplayObject_setScale = new NativeFunction(base.add(0x1005a0f58), 'void', ['pointer', 'float', 'float']);
          var Stage_addChild = new NativeFunction(base.add(0x1005a0f74), 'void', ['pointer', 'pointer']);
          function getMC(scFile, clipName) {
              var sc = Memory.allocUtf8String(scFile);
              var name = Memory.allocUtf8String(clipName);
              return StringTable_getMovieClip(sc, name);
          }
          function createButton() {
              var stage = Stage_instance.readPointer();
              if (stage.isNull()) return;
              var menuBtn = getMC("sc/ui.sc", "menu_button");
              if (menuBtn.isNull()) {
                  console.log("[NW] Failed to load menu_button movieclip.");
                  return;
              }
              DisplayObject_setXY(menuBtn, 40, 40);
              DisplayObject_setScale(menuBtn, 1.35, 1.35);
              Stage_addChild(stage, menuBtn);
              console.log("[NW] Mod menu UI injected successfully.");
          }
          function isLobbyReady() {
              var stage = Stage_instance.readPointer();
              if (stage.isNull()) return false;
              var lobbyClips = ["play_button", "home_button", "battle_button", "shop_button"];
              for (var i = 0; i < lobbyClips.length; i++) {
                  var clip = getMC("sc/ui.sc", lobbyClips[i]);
                  if (!clip.isNull()) return true;
              }
              return false;
          }
          var initialized = false;
          function initializeUI() {
              if (initialized) return;
              initialized = true;
              console.log("[NW] Lobby detected, building UI...");
              createButton();
          }
          var attempts = 0;
          var checkInterval = setInterval(function() {
              attempts++;
              if (attempts > 60) {
                  clearInterval(checkInterval);
                  console.log("[NW] ERR: Lobby detection timed out.");
                  return;
              }
              try {
                  if (isLobbyReady()) {
                      clearInterval(checkInterval);
                      initializeUI();
                  }
              } catch(e) {
              }
          }, 1200);
          EOF

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadget-framework
          path: gadget.framework
