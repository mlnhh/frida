name: Build Custom Frida Gadget

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Frida Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install Build Dependencies
        run: |
          brew update
          brew install node npm ninja meson pkg-config vala
          npm install -g frida-compile
          python3 -m pip install setuptools --break-system-packages

      - name: Inject Observation Wiretaps
        run: |
          python3 -c '
          with open("subprojects/frida-core/lib/gadget/gadget-glue.c", "r") as f:
              code = f.read()
          
          injection = """
          #include <gum/gum.h>
          #include <sys/stat.h>
          #include <unistd.h>
          #include <stdlib.h>
          #include <syslog.h>
          
          static int (*original_stat)(const char *path, struct stat *sb) = NULL;
          static int (*original_access)(const char *path, int amode) = NULL;
          static void (*original_exit)(int status) = NULL;
          static void (*original_abort)(void) = NULL;
          
          // Wiretap: Watch what files Promon looks for
          static int replacement_stat(const char *path, struct stat *sb) {
              if (path) syslog(LOG_ERR, "[WIRETAP] stat check: %s", path);
              return original_stat(path, sb);
          }
          
          static int replacement_access(const char *path, int amode) {
              if (path) syslog(LOG_ERR, "[WIRETAP] access check: %s", path);
              return original_access(path, amode);
          }
          
          // Anti-Crash: Stop Promon from killing the app when it detects us
          static void replacement_exit(int status) {
              syslog(LOG_ERR, "[WIRETAP] PROMON TRIGGERED EXIT(%d)! Freezing thread to preserve logs.", status);
              while(1) { sleep(1); }
          }
          
          static void replacement_abort(void) {
              syslog(LOG_ERR, "[WIRETAP] PROMON TRIGGERED ABORT! Freezing thread to preserve logs.");
              while(1) { sleep(1); }
          }
          
          static void setup_wiretaps(void) {
              GumInterceptor *interceptor = gum_interceptor_obtain();
              gum_interceptor_begin_transaction(interceptor);
              
              gum_interceptor_replace(interceptor, GSIZE_TO_POINTER(gum_module_find_export_by_name(NULL, "stat")), (gpointer)replacement_stat, (gpointer*)&original_stat);
              gum_interceptor_replace(interceptor, GSIZE_TO_POINTER(gum_module_find_export_by_name(NULL, "access")), (gpointer)replacement_access, (gpointer*)&original_access);
              gum_interceptor_replace(interceptor, GSIZE_TO_POINTER(gum_module_find_export_by_name(NULL, "exit")), (gpointer)replacement_exit, (gpointer*)&original_exit);
              gum_interceptor_replace(interceptor, GSIZE_TO_POINTER(gum_module_find_export_by_name(NULL, "abort")), (gpointer)replacement_abort, (gpointer*)&original_abort);
              
              gum_interceptor_end_transaction(interceptor);
          }
          """
          
          code = injection + "\n" + code
          code = code.replace("gum_init_embedded ();", "gum_init_embedded ();\n  setup_wiretaps();")
          
          with open("subprojects/frida-core/lib/gadget/gadget-glue.c", "w") as f:
              f.write(code)
          '

      - name: Build iOS Gadget
        run: |
          export FRIDA_PYTHON=disabled
          export FRIDA_SWIFT=disabled
          export FRIDA_TOOLS=disabled
          export FRIDA_NODE=disabled
          export CFLAGS="-DFRIDA_LIBDIR_NAME=\\\"lib\\\""
          export OBJCFLAGS="-DFRIDA_LIBDIR_NAME=\\\"lib\\\""
          ./configure --host=ios-arm64
          make || true

      - name: Assemble REGeared.framework
        run: |
          mkdir -p REGeared.framework/ss
          
          find build -name "frida-gadget.dylib" -exec cp {} REGeared.framework/REGeared \;
          if [ ! -f REGeared.framework/REGeared ]; then
            find build -name "libfrida-gadget-raw.dylib" -exec cp {} REGeared.framework/REGeared \;
          fi
          
          cat << "EOF" > REGeared.framework/REGeared.config
          {
            "interaction": {
              "type": "script",
              "path": "ss/load.lebronjs",
              "on_change": "ignore"
            }
          }
          EOF
          
          cat << "EOF" > REGeared.framework/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>CFBundleExecutable</key>
          <string>REGeared</string>
          <key>CFBundleIdentifier</key>
          <string>com.regeared.engine</string>
          <key>CFBundleName</key>
          <string>REGearedEngine</string>
          <key>CFBundlePackageType</key>
          <string>FMWK</string>
          </dict>
          </plist>
          EOF
          
          cat << "EOF" > REGeared.framework/ss/load.lebronjs
          // Empty JS payload. All the heavy lifting is in the C hooks right now.
          console.log("[WIRETAP] JavaScript bridge active, waiting for Promon checks...");
          EOF

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: REGeared-framework
          path: REGeared.framework
