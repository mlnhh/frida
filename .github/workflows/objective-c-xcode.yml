name: Build Custom Frida Gadget

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Frida Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install Build Dependencies
        run: |
          brew update
          brew install node npm ninja meson pkg-config vala
          npm install -g frida-compile
          python3 -m pip install setuptools --break-system-packages

      - name: Inject Ghost Wiretap (Isolation Test)
        run: |
          python3 -c '
          with open("subprojects/frida-core/lib/gadget/gadget-glue.c", "r") as f:
              code = f.read()
          
          injection = """
          #include <gum/gum.h>
          #include <syslog.h>
          
          static void setup_wiretaps(void) {
              // We hook NOTHING. We just announce that we are in the RAM.
              syslog(LOG_ERR, "[WIRETAP] GHOST GADGET LOADED SUCCESSFULLY. WAITING FOR CRASH...");
          }
          """
          
          code = injection + "\n" + code
          code = code.replace("gum_init_embedded ();", "gum_init_embedded ();\n  setup_wiretaps();")
          
          with open("subprojects/frida-core/lib/gadget/gadget-glue.c", "w") as f:
              f.write(code)
          '

      - name: Build iOS Gadget
        run: |
          export FRIDA_PYTHON=disabled
          export FRIDA_SWIFT=disabled
          export FRIDA_TOOLS=disabled
          export FRIDA_NODE=disabled
          export CFLAGS="-DFRIDA_LIBDIR_NAME=\\\"lib\\\""
          export OBJCFLAGS="-DFRIDA_LIBDIR_NAME=\\\"lib\\\""
          ./configure --host=ios-arm64
          make || true

      - name: Assemble REGeared.framework
        run: |
          mkdir -p REGeared.framework/ss
          find build -name "frida-gadget.dylib" -exec cp {} REGeared.framework/REGeared \;
          if [ ! -f REGeared.framework/REGeared ]; then
            find build -name "libfrida-gadget-raw.dylib" -exec cp {} REGeared.framework/REGeared \;
          fi
          
          cat << "EOF" > REGeared.framework/REGeared.config
          {
            "interaction": { "type": "script", "path": "ss/load.lebronjs", "on_change": "ignore" }
          }
          EOF
          
          cat << "EOF" > REGeared.framework/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          <key>CFBundleExecutable</key><string>REGeared</string>
          <key>CFBundleIdentifier</key><string>com.regeared.engine</string>
          <key>CFBundleName</key><string>REGearedEngine</string>
          <key>CFBundlePackageType</key><string>FMWK</string>
          </dict>
          </plist>
          EOF
          
          echo "console.log('[WIRETAP] JS Bridge Active');" > REGeared.framework/ss/load.lebronjs

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: REGeared-framework
          path: REGeared.framework
