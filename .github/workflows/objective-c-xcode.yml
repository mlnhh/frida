name: Build Custom Frida Gadget

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Frida Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Install Build Dependencies
        run: |
          brew update
          brew install node npm ninja meson pkg-config vala
          npm install -g frida-compile
          python3 -m pip install setuptools --break-system-packages

      - name: Inject The Matrix Dodge (Signal Handler)
        run: |
          python3 -c '
          with open("subprojects/frida-core/lib/gadget/gadget-glue.c", "r") as f:
              code = f.read()
          
          injection = """
          #include <gum/gum.h>
          #include <signal.h>
          #include <syslog.h>
          #include <unistd.h>
          
          // The Bullet Catcher
          static void poison_pill_handler(int sig, siginfo_t *info, void *context) {
              if (info->si_addr == (void *)0x123456789a00) {
                  syslog(LOG_ERR, "[WIRETAP] THE MATRIX DODGE: Caught Promon jumping to 0x123456789a00!");
                  syslog(LOG_ERR, "[WIRETAP] Anti-cheat kill-thread is now permanently frozen.");
                  
                  // Put the thread that tried to kill the app into a permanent coma
                  while (1) { sleep(1); }
              } else {
                  // If it is a normal crash, let it happen so we do not break the game
                  syslog(LOG_ERR, "[WIRETAP] Standard crash detected at %p", info->si_addr);
                  signal(sig, SIG_DFL);
              }
          }
          
          __attribute__((constructor))
          static void setup_wiretaps(void) {
              syslog(LOG_ERR, "[WIRETAP] Matrix Signal Handler active. Waiting for poison pill...");
              
              struct sigaction sa;
              sa.sa_flags = SA_SIGINFO;
              sa.sa_sigaction = poison_pill_handler;
              sigemptyset(&sa.sa_mask);
              
              // Trap the specific hardware faults Promon uses to kill the app
              sigaction(SIGSEGV, &sa, NULL);
              sigaction(SIGBUS, &sa, NULL);
          }
          """
          
          code = injection + "\n" + code
          
          with open("subprojects/frida-core/lib/gadget/gadget-glue.c", "w") as f:
              f.write(code)
          '

      - name: Build iOS Gadget
        run: |
          export FRIDA_PYTHON=disabled
          export FRIDA_SWIFT=disabled
          export FRIDA_TOOLS=disabled
          export FRIDA_NODE=disabled
          export CFLAGS="-DFRIDA_LIBDIR_NAME=\\\"lib\\\""
          export OBJCFLAGS="-DFRIDA_LIBDIR_NAME=\\\"lib\\\""
          ./configure --host=ios-arm64
          make || true

      - name: Assemble REGeared.framework
        run: |
          mkdir -p REGeared.framework/ss
          find build -name "frida-gadget.dylib" -exec cp {} REGeared.framework/REGeared \;
          if [ ! -f REGeared.framework/REGeared ]; then
            find build -name "libfrida-gadget-raw.dylib" -exec cp {} REGeared.framework/REGeared \;
          fi
          
          cat << "EOF" > REGeared.framework/REGeared.config
          {
            "interaction": { "type": "script", "path": "ss/load.lebronjs", "on_change": "ignore" }
          }
          EOF
          
          echo "console.log('[WIRETAP] JS Bridge Active');" > REGeared.framework/ss/load.lebronjs

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: REGeared-framework
          path: REGeared.framework
