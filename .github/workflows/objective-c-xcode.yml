name: Build BSRE Gadget
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          brew install bison flex gettext make cmake
          pip3 install colorama prompt-toolkit pygments cryptography setuptools --break-system-packages
          echo "/opt/homebrew/opt/bison/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/opt/flex/bin" >> $GITHUB_PATH
          echo "/opt/homebrew/opt/make/libexec/gnubin" >> $GITHUB_PATH

      - name: Inject Custom Source Files
        run: |
          cp bs-custom-files/gadget.vala subprojects/frida-core/lib/gadget/gadget.vala
          cp bs-custom-files/gadget-darwin.m subprojects/frida-core/lib/gadget/gadget-darwin.m
          cp bs-custom-files/gadget-glue.c subprojects/frida-core/lib/gadget/gadget-glue.c

      - name: Compile Gadget for iOS
        run: |
          export CFLAGS="-DFRIDA_LIBDIR_NAME=\\\"frida\\\""
          export FRIDA_PYTHON=disabled
          export FRIDA_TOOLS=disabled
          export FRIDA_NODE=disabled
          ./configure --host=ios-arm64
          make

      - name: Assemble gadget.framework
        run: |
          mkdir -p gadget.framework
          find build -name "frida-gadget.dylib" -exec cp {} gadget.framework/gadget \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gadget.framework
          path: gadget.framework
